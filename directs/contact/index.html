<!doctype html>
<html lang="en">
  <head>

    </style>
    <title>რა ჰქვია რელიგიის შესწავლას?</title>
  </head>
  <body>
    <div class="div1"></div>
    <div class="headerdiv1">
      <header class="header">
        <ul>
          <li>
            <a href="index.html"><i class="fa-solid fa-house"></i></a
            ><a class="a1" href="index.html">მთავარი</a>
          </li>
          <li>
            <a href="directs/about/index.html"
              ><i class="fa-solid fa-info-circle"></i
            ></a>
            <a class="a1" href="directs/about/index.html">შესახებ</a>
          </li>
          <li>
            <a href="directs/sources/index.html"
              ><i class="fa-solid fa-book"></i></a
            ><a class="a1" href="directs/sources/index.html">წყაროები</a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-envelope"></i></a
            ><a class="a1" href="#" id="active">კონტაქტი</a>
          </li>
          <li>
            <a href="directs/services/index.html"
              ><i class="fa-solid fa-cogs"></i></a
            ><a class="a1" href="directs/services/index.html">სერვისები</a>
          </li>
        </ul>
      </header>
    </div>
    <div class="maincontact">
      <div class="div2contact">
        <img src="images/sceneryv4.jpg" alt="image" class="imagecontact" />
        <h1 class="h1maincontact">კონტაქტი</h1>
        <p class="pcontact">
          დაგვიკავშირდეთ ქვემოთ მოცემული ფორმის საშუალებით.
        </p>
        <form class="formcontact">
          <label for="name">სახელი:</label>
          <input type="text" id="name" name="name" required />

          <label for="email">ელ.ფოსტა:</label>
          <input type="email" id="email" name="email" required />

          <label for="message">შეტყობინება:</label>
          <textarea id="message" name="message" rows="4" required></textarea>

          <button type="submit">გაგზავნა</button>
        </form>
      </div>
      <div class="div3"></div>
      <footer class="footer">
        <a href="directs/services/index.html"
          ><i class="fa-solid fa-cogs"></i
        ></a>
        <a href="directs/contact/index.html"
          ><i class="fa-solid fa-envelope"></i
        ></a>
      </footer>
    </div>
  </body>
